<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Death Gang | عصابة الموت</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Tahoma, Arial;
    background: linear-gradient(#5b0000, #c10000);
    color:#fff;
    text-align:center;
}

/* ====== الغلاف ====== */
.header{
    background: url("header.jpg") center/cover no-repeat;
    padding:40px 10px;
}
.header h1{
    margin:10px 0 0;
    font-size:32px;
    text-shadow:0 0 10px #000;
}
.header h2{
    margin:5px 0;
    font-size:22px;
    color:#ffcccc;
}

/* ====== العنوان ====== */
.title-bar{
    background:#ff0000;
    padding:10px;
    font-size:22px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    padding-inline:20px;
}

/* ====== الأعضاء ====== */
.members{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:15px;
    padding:20px;
}

.member{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#6a00ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    box-shadow:0 0 10px #000;
}

.avatar img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

.name{
    margin-top:5px;
    font-size:14px;
    color:#ffd700;
}

/* ====== الخط ====== */
.hr{
    height:3px;
    background: repeating-linear-gradient(
        90deg,
        #00ffff,
        #00ffff 10px,
        transparent 10px,
        transparent 20px
    );
    margin:10px 20px;
}

/* ====== النوافذ ====== */
.windows{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:15px;
    padding:20px;
}

.window{
    background:#000;
    border-radius:10px;
    padding:25px 5px;
    box-shadow:0 0 10px #00ffff;
}

.add-window{
    width:70px;
    height:70px;
    margin:0 auto 20px;
    background:#000;
    border-radius:10px;
    font-size:40px;
    line-height:70px;
    box-shadow:0 0 10px #00ffff;
}

/* ====== موبايل ====== */
@media(max-width:768px){
    .members{grid-template-columns: repeat(3,1fr);}
    .windows{grid-template-columns: repeat(2,1fr);}
}
</style>
</head>

<body>

<!-- الغلاف -->
<div class="header">
    <h1>Death Gang</h1>
    <h2>عصابة الموت</h2>
</div>

<!-- العنوان -->
<div class="title-bar">
    <span>Death Gang</span>
    <span>عصابة الموت</span>
</div>

<div class="hr"></div>

<!-- الأعضاء -->
<div class="members">

    <!-- عضو -->
    <div class="member">
        <div class="avatar">
            <img src="shadow.png">
        </div>
        <div class="name">شادو</div>
    </div>

    <div class="member">
        <div class="avatar">
            <img src="luffy.png">
        </div>
        <div class="name">لوفي</div>
    </div>

    <!-- أماكن فارغة -->
    <div class="member">
        <div class="avatar">+</div>
        <div class="name">---</div>
    </div>

    <div class="member">
        <div class="avatar">+</div>
        <div class="name">---</div>
    </div>

    <div class="member">
        <div class="avatar">+</div>
        <div class="name">---</div>
    </div>

</div>

<div class="hr"></div>

<!-- النوافذ -->
<div class="windows">
    <div class="window">اسم نافذة</div>
    <div class="window">اسم نافذة</div>
    <div class="window">اسم نافذة</div>
    <div class="window">اسم نافذة</div>
</div>

<div class="add-window">+</div>

</body>
</html>
