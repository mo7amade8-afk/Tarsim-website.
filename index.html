<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Death Gang</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#b30000;
    color:#fff;
    text-align:center;
}
header img{
    width:100%;
    max-height:280px;
    object-fit:cover;
}
.icons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px 0;
}
.icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#6a00ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    cursor:pointer;
}
.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:center;
    justify-content:center;
}
.menu{
    background:#6a00ff;
    width:300px;
    padding:20px;
    border-radius:15px;
    position:relative;
}
.vip{
    position:absolute;
    top:10px;
    right:10px;
    width:35px;
    height:35px;
    border-radius:50%;
    background:yellow;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}
.stars{color:gold;font-size:18px;}
.modal{
    display:none;
    background:#b30000;
    padding:20px;
    border-radius:15px;
}
textarea{
    width:100%;
    height:80px;
}
button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.boxes{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin:30px;
}
.box{
    background:#000;
    padding:20px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <img src="ggg.png" alt="header">
</header>

<div class="icons">
    <div class="icon" onclick="openMenu(1)">+</div>
    <div class="icon" onclick="openMenu(2)">+</div>
    <div class="icon" onclick="openMenu(3)">+</div>
</div>

<div class="overlay" id="overlay">
    <div class="menu">
        <div class="vip" onclick="vip()">VIP</div>
        <div class="stars">★★★★★</div>
        <p>وصف القائمة هنا – يمكنك تعديله</p>
        <button onclick="closeMenu()">إغلاق</button>
    </div>
</div>

<div class="overlay" id="vipModal">
    <div class="modal">
        <textarea placeholder="اكتب التعليق هنا"></textarea>
        <br>
        <button onclick="sendData()">إرسال</button>
        <button onclick="confirm()">✅</button>
    </div>
</div>

<div class="boxes">
    <div class="box" onclick="openIndex('index1.html')">اسم نافذة</div>
    <div class="box" onclick="openIndex('index2.html')">اسم نافذة</div>
    <div class="box" onclick="openIndex('index3.html')">اسم نافذة</div>
    <div class="box" onclick="openIndex('index4.html')">اسم نافذة</div>
</div>

<script>
const RENDER_API = "https://YOUR-RENDER-APP.onrender.com/api"; // فقط المسار

function openMenu(){
    document.getElementById("overlay").style.display="flex";
}
function closeMenu(){
    document.getElementById("overlay").style.display="none";
}
function vip(){
    let pass = prompt("ادخل كلمة سر VIP");
    fetch(RENDER_API + "/vip",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:pass})
    }).then(r=>r.json()).then(d=>{
        if(d.status=="ok"){
            document.getElementById("vipModal").style.display="flex";
        }else{
            alert("كلمة سر خاطئة");
        }
    });
}
function sendData(){
    fetch(RENDER_API + "/send",{method:"POST"});
}
function confirm(){
    fetch(RENDER_API + "/confirm",{method:"POST"});
}
function openIndex(page){
    window.open(page,"_blank");
}
</script>

</body>
</html>
